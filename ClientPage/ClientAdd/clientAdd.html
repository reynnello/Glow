<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" type="text/css" href="../../Main.css" />
    <title>Add Client</title>
  </head>
  <body>

    <!-- Top bar: logo links back to main page, tabs navigate between sections -->
    <header class="topbar">
      <a class="brand" href="../../mainPage.html" aria-label="Go to Main Page">
        <div class="logo">
          <img src="../../resources/img/logo.png" alt="Glow Logo" />
        </div>
        <div class="brand-text">
          <div class="brand-subtitle">Add Client</div>
        </div>
      </a>

      <!-- Client tab is marked active since we are on this section -->
      <nav class="tabs" aria-label="Primary navigation">
        <a class="tab active" href="../clientPage.html">Client</a>
        <a class="tab" href="../../JobPage/jobPage.html">Job</a>
        <a class="tab" href="../../TrainingCourse/coursePage.html">Training Course</a>
        <a class="tab" href="../../CompanyPage/companyPage.html">Company</a>
      </nav>
    </header>

    <!-- Centered single-column layout for the form -->
    <main class="page page--center">
      <section class="card">
        <h1>Add Client</h1>
        <p class="hint">Please fill the information and add the Client</p>

        <!-- Form posts to AddClientPost.php; confirmCheck() runs validation before submit -->
        <form name="addClientForm" action="AddClientPost.php" onsubmit="return confirmCheck();" method="post">
          <div class="form-grid">

            <div class="field">
              <label for="addName">Client Name</label>
              <input type="text" name="addName" id="addName" placeholder="Enter client's full name" required />
            </div>

            <div class="field">
              <label for="addAddress">Client Address</label>
              <input type="text" name="addAddress" id="addAddress" placeholder="Enter full residential address" required />
            </div>

            <!-- Irish eircode pattern: letter, 2 digits, optional space, 4 alphanumeric chars -->
            <div class="field">
              <label for="addEircode">Eircode</label>
              <input type="text" name="addEircode" id="addEircode" pattern="^[A-Za-z]\d{2}\s?[A-Za-z0-9]{4}$" placeholder="e.g. A12 B3CD" required />
            </div>

            <!-- Allows digits, spaces, parentheses, dashes and + sign -->
            <div class="field">
              <label for="addPhone">Phone Number</label>
              <input type="tel" name="addPhone" id="addPhone" pattern="^[0-9\(\)\-\s+]+$" placeholder="e.g. (123) 456-7890" required />
            </div>

            <div class="field">
              <label for="addDob">Date of Birth</label>
              <input type="date" name="addDob" id="addDob" required />
            </div>

            <!-- Dropdown for license type: Full, Provisional, or None -->
            <div class="field">
              <label for="addDriverLicense">Driver License Type</label>
              <select name="addDriverLicense" id="addDriverLicense" required>
                <option hidden>Select License Type</option>
                <option value="Full">Full</option>
                <option value="Provisional">Provisional</option>
                <option value="None">None</option>
              </select>
            </div>

            <div class="field">
              <label for="addJobTitle">Job Title</label>
              <input type="text" name="addJobTitle" id="addJobTitle" placeholder="Enter desired job title" required />
            </div>

            <div class="field">
              <label for="addQualifications">Qualifications</label>
              <input type="text" name="addQualifications" id="addQualifications" placeholder="Enter qualification" required />
            </div>

            <div class="field">
              <label for="addMinAnnualSalary">Minimum Annual Salary</label>
              <input type="number" name="addMinAnnualSalary" id="addMinAnnualSalary" placeholder="Enter expected salary (€)" required />
            </div>

          </div>

          <!-- Submit and back buttons -->
          <div style="margin-top: 14px">
            <input type="submit" value="Add Client" class="btn primary" />
            <a href="../clientPage.html" class="btn">Back</a>
          </div>
        </form>
      </section>
    </main>

    <footer class="footer">
      <span>© 2026 - "We are the best at what we do!"</span>
      <span class="github-link">
        <a href="https://github.com/reynnello/Glow" target="_blank" rel="noopener noreferrer" aria-label="View the project on GitHub">
          <img src="../../resources/img/github.svg" alt="GitHub" />
        </a>
      </span>
    </footer>

    <script>
      function confirmCheck() {
        // Grab and trim all field values
        var name           = document.getElementById("addName").value.trim();
        var address        = document.getElementById("addAddress").value.trim();
        var eircode        = document.getElementById("addEircode").value.trim();
        var phone          = document.getElementById("addPhone").value.trim();
        var dob            = document.getElementById("addDob").value.trim();
        var driverLicense  = document.getElementById("addDriverLicense").value.trim();
        var jobTitle       = document.getElementById("addJobTitle").value.trim();
        var qualifications = document.getElementById("addQualifications").value.trim();
        var minAnnualSalary = document.getElementById("addMinAnnualSalary").value.trim();

        // Block submission if any required field is empty
        if (name === "" || address === "" || eircode === "" || phone === "" ||
            dob === "" || driverLicense === "" || jobTitle === "" ||
            qualifications === "" || minAnnualSalary === "") {
          alert("Please fill out required information");
          return false;
        }

        // Age validation: client must be at least 16 years old
        const dobDate   = new Date(dob);
        const today     = new Date();
        let age         = today.getFullYear() - dobDate.getFullYear();
        const monthDiff = today.getMonth() - dobDate.getMonth();

        // Adjust age if the birthday hasn't happened yet this year
        if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < dobDate.getDate())) {
          age--;
        }

        if (age < 16) {
          alert("Client must be at least 16 years old.");
          return false;
        }

        // All validation passed - ask for final confirmation
        return confirm("Are you sure you want to save these changes?");
      }
    </script>

  </body>
</html>
